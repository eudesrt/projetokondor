<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vila Mascote — App do Condomínio</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #d9e2ec 0%, #c9d6e2 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    .container {
      text-align: center;
    }
    h1 {
      color: #0b1e2d;
      margin-bottom: 10px;
      font-size: 28px;
    }
    p {
      color: #3a4a59;
      margin-bottom: 30px;
      font-size: 16px;
    }
    a {
      display: inline-block;
      padding: 12px 28px;
      background-color: #0a84c8;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
      transition: background-color 0.3s;
    }
    a:hover {
      background-color: #076fa8;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Vila Mascote</h1>
    <p>App do Condomínio</p>
    <a href="/app/">Acessar Aplicativo</a>
  </div>
</body>
</html>
