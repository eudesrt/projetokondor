<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} + ' — Viva Benx Mascote'">Viva Benx Mascote</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/tokens.css}">
    <link rel="stylesheet" th:href="@{/css/components.css}">
    <link rel="stylesheet" th:href="@{/css/desktop.css}">
    <link rel="stylesheet" th:href="@{/css/responsive.css}">
</head>
<body>

<!-- Mobile tab bar (fixed bottom) -->
<nav class="tabbar" th:fragment="tabbar(active)">
    <div class="tabbar__inner">
        <a th:href="@{/}" class="tabbar__item"
           th:classappend="${active == 'home'} ? 'is-active'">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5L12 3l9 7.5V20a1 1 0 01-1 1h-5v-6h-6v6H4a1 1 0 01-1-1V10.5z"/></svg>
            <span class="tabbar__label">Início</span>
        </a>
        <a th:href="@{/noticias}" class="tabbar__item"
           th:classappend="${active == 'news'} ? 'is-active'">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M7 8h10M7 12h10M7 16h6"/></svg>
            <span class="tabbar__label">Notícias</span>
        </a>
        <a th:href="@{/acesso}" class="tabbar__raised" aria-label="Acesso QR">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><path d="M14 14h3v3M20 14v3M14 20h3M20 17v4"/></svg>
        </a>
        <a th:href="@{/chamados}" class="tabbar__item"
           th:classappend="${active == 'tickets'} ? 'is-active'">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a4 4 0 015.3 5.3l-9 9a2 2 0 11-2.8-2.8l9-9z"/><path d="M14 6l4 4"/></svg>
            <span class="tabbar__label">Chamados</span>
        </a>
        <a th:href="@{/perfil}" class="tabbar__item"
           th:classappend="${active == 'profile'} ? 'is-active'">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0116 0"/></svg>
            <span class="tabbar__label">Perfil</span>
        </a>
    </div>
</nav>

<!-- Logo SVG (reusable) -->
<svg th:fragment="logo(size)" th:attr="width=${size}, height=${size}" viewBox="0 0 40 40">
    <defs>
        <linearGradient id="vbxLogoG" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#0a84c8"/>
            <stop offset="1" stop-color="#8dc63f"/>
        </linearGradient>
    </defs>
    <path d="M20 35 L6 12 a8 8 0 0 1 14 -4 a8 8 0 0 1 14 4 Z" fill="url(#vbxLogoG)"/>
    <circle cx="20" cy="20" r="3.5" fill="#fff"/>
</svg>

<!-- Urgent banner (reusable) -->
<a th:fragment="urgent(urgent)" th:href="@{/noticias/urgente}" class="urgent urgent-pulse">
    <div class="urgent__icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l10 18H2L12 3z"/><path d="M12 10v4M12 18v.01"/></svg>
    </div>
    <div style="flex:1; min-width:0;">
        <div class="urgent__eyebrow">Comunicado urgente</div>
        <div class="urgent__title" th:text="${urgent != null ? urgent.title : ''}">Título</div>
        <div class="urgent__when" th:text="${urgent != null ? urgent.when : ''}">Quando</div>
    </div>
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#b53a3a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>
</a>

<!-- Ticker (reusable) -->
<div th:fragment="ticker(items)" class="ticker">
    <div class="ticker__label">
        <span class="ticker__pulse"></span>
        Ao vivo
    </div>
    <div class="ticker__stage">
        <div class="ticker__track">
            <a th:each="it : ${items}" th:href="@{/noticias}" class="ticker__item">
                <span class="ticker__chip" th:classappend="|tk-${it.kind}|">
                    <span class="ticker__dot"></span>
                    <span th:text="${it.label}">Label</span>
                </span>
                <span th:text="${it.text}">Texto da notícia</span>
                <span class="ticker__sep">●</span>
            </a>
            <!-- Duplicated for seamless loop -->
            <a th:each="it : ${items}" th:href="@{/noticias}" class="ticker__item">
                <span class="ticker__chip" th:classappend="|tk-${it.kind}|">
                    <span class="ticker__dot"></span>
                    <span th:text="${it.label}">Label</span>
                </span>
                <span th:text="${it.text}">Texto da notícia</span>
                <span class="ticker__sep">●</span>
            </a>
        </div>
    </div>
</div>

<!-- Badge helper -->
<span th:fragment="badge(cat, tag)" class="badge"
      th:classappend="${tag == 'eventos'} ? 'badge--green' : (${tag == 'avisos'} ? 'badge--amber' : (${tag == 'urgente'} ? 'badge--red' : ''))"
      th:text="${cat}">Categoria</span>

</body>
</html>
