<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Início')}"></head>
<body>

<div class="container page fade-in">

    <!-- Hero -->
    <header class="hero">
        <div class="hero__top">
            <div class="hero__brand">
                <svg th:replace="~{fragments/layout :: logo(38)}"></svg>
                <div>
                    <div class="hero__brand-eyebrow">Condomínio</div>
                    <div class="hero__brand-name">Viva Benx Mascote</div>
                </div>
            </div>
            <a th:href="@{/notificacoes}" class="bell" aria-label="Notificações">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M18 16v-5a6 6 0 10-12 0v5l-2 2h16l-2-2z"/><path d="M10 20a2 2 0 004 0"/></svg>
                <span class="bell__dot"></span>
            </a>
        </div>
        <div class="hero__greeting">
            <div class="avatar avatar--lg" th:text="${user.initials}">MO</div>
            <div style="flex:1; min-width:0;">
                <div class="hero__hello">Olá, <em th:text="${user.name}">Marina</em></div>
                <div class="hero__unit" th:text="${user.unit}">Torre 1 • Apto 1208</div>
            </div>
        </div>
    </header>

    <!-- Ticker of pre-registered condo news -->
    <div th:if="${tickerItems != null and !tickerItems.isEmpty()}" th:replace="~{fragments/layout :: ticker(${tickerItems})}"></div>

    <!-- Urgent banner -->
    <div th:if="${urgent != null}" th:replace="~{fragments/layout :: urgent(${urgent})}"></div>

    <!-- Quick tiles -->
    <div class="tiles">
        <a th:href="@{/chamados}" class="tile tone-amber">
            <div class="tile__head">
                <div class="tile__icon">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a4 4 0 015.3 5.3l-9 9a2 2 0 11-2.8-2.8l9-9z"/><path d="M14 6l4 4"/></svg>
                </div>
                <span class="tile__count">2</span>
            </div>
            <div class="tile__label">Abrir chamado</div>
        </a>
        <a th:href="@{/areas}" class="tile tone-accent">
            <div class="tile__head">
                <div class="tile__icon">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 9h18M8 3v4M16 3v4"/></svg>
                </div>
            </div>
            <div class="tile__label">Reservar área</div>
        </a>
        <a th:href="@{/encomendas}" class="tile tone-brand">
            <div class="tile__head">
                <div class="tile__icon">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 8L12 3 3 8v8l9 5 9-5V8z"/><path d="M3 8l9 5 9-5M12 13v9"/></svg>
                </div>
                <span class="tile__count">2</span>
            </div>
            <div class="tile__label">Encomendas</div>
        </a>
        <a th:href="@{/votacoes}" class="tile tone-gray">
            <div class="tile__head">
                <div class="tile__icon">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20V10M10 20V4M16 20v-7M22 20H2"/></svg>
                </div>
                <span class="tile__count">1</span>
            </div>
            <div class="tile__label">Votações</div>
        </a>
    </div>

    <!-- News preview -->
    <div class="section-head">
        <div>
            <div class="section-head__eyebrow">Portal de notícias</div>
            <div class="section-head__title">Últimas do condomínio</div>
        </div>
        <a th:href="@{/noticias}" class="section-head__link">Ver tudo</a>
    </div>

    <div class="news-list">
        <a th:each="n : ${newsPreview}" th:href="@{/noticias/{id}(id=${n.id})}" class="card card--interactive">
            <div class="news-row">
                <div style="flex:1; min-width:0; padding-right:6px;">
                    <span th:if="${n.highlighted}" class="badge badge--green" style="margin-bottom:4px;">DESTAQUE</span>
                    <div class="news-row__title" th:text="${n.title}">Título da notícia</div>
                    <div class="news-row__meta" th:text="${#temporals.format(n.publishDate, 'dd MMM yyyy')}">Data</div>
                </div>
            </div>
        </a>
    </div>

    <!-- Contacts rail -->
    <div class="section-head" style="padding-top: 10px;">
        <div class="section-head__title" style="font-size:20px;">Contatos rápidos</div>
        <a th:href="@{/contatos}" class="section-head__link">Ver todos</a>
    </div>
    <div class="contacts-rail scroll-x">
        <a th:each="c : ${contacts}" th:href="@{/contatos}" class="contacts-rail__item">
            <div class="avatar avatar--sm" th:style="|background: ${c.color}|" th:text="${c.avatar}">RA</div>
            <div>
                <div class="contacts-rail__name" th:text="${c.name}">Nome</div>
                <div class="contacts-rail__role" th:text="${c.role}">Papel</div>
            </div>
        </a>
    </div>

    <!-- Tab bar -->
    <div th:replace="~{fragments/layout :: tabbar('home')}"></div>
</div>

</body>
</html>
