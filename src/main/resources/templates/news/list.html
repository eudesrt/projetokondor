<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout}">

<head>
    <title>Mural de Notícias</title>
</head>

<body>
    <div layout:fragment="page-header">
        <div>
            <span
                style="font-size: 0.75rem; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em;">Informativos</span>
            <h1 style="font-size: 1.5rem; font-weight: 800; color: var(--primary);">Mural do Condomínio</h1>
        </div>
    </div>

    <div layout:fragment="content" class="animate-fade-in">
        <div style="max-width: 1100px; margin: 0 auto;">

            <!-- Filters -->
            <div class="card mb-4" style="padding: 1.5rem;">
                <form th:action="@{/news}" method="get"
                    style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; align-items: end;">
                    <div>
                        <label class="form-label" style="font-size: 0.75rem;">Buscar por Palavra-chave</label>
                        <input type="text" name="keyword" th:value="${keyword}" class="form-control"
                            placeholder="Ex: Reforma, Assembleia...">
                    </div>
                    <div>
                        <label class="form-label" style="font-size: 0.75rem;">Período (De)</label>
                        <input type="date" name="dateFrom" th:value="${dateFrom}" class="form-control">
                    </div>
                    <div>
                        <label class="form-label" style="font-size: 0.75rem;">Período (Até)</label>
                        <input type="date" name="dateTo" th:value="${dateTo}" class="form-control">
                    </div>
                    <div>
                        <div class="form-check" style="margin-bottom: 0.5rem;">
                            <input type="checkbox" name="highlighted" value="true" class="form-check-input"
                                id="checkHighlight" th:checked="${highlighted}">
                            <label class="form-check-label" for="checkHighlight" style="font-size: 0.875rem;">Apenas
                                Destaques</label>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary" style="height: 42px;">Filtrar Notícias</button>
                    <a th:href="@{/news}" class="btn btn-ghost" style="height: 42px; text-align: center;">Limpar</a>
                </form>
            </div>

            <!-- News List -->
            <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.5rem;">
                <article th:each="news : ${newsList}" class="card"
                    style="padding: 0; display: flex; flex-direction: column; height: 100%; transition: transform 0.2s; overflow: hidden;">
                    <!-- Image -->
                    <div th:if="${not #lists.isEmpty(news.images)}"
                        style="height: 180px; position: relative; overflow: hidden;">
                        <img th:src="@{'/uploads' + ${news.images[0].imageUrl}}"
                            style="width: 100%; height: 100%; object-fit: cover;">
                        <div th:if="${news.highlighted}"
                            style="position: absolute; top: 10px; right: 10px; background: var(--accent); color: white; border-radius: 50%; padding: 0.5rem; box-shadow: var(--shadow-md);"
                            title="Destaque">
                            <i data-lucide="star" style="width: 16px; height: 16px; fill: white;"></i>
                        </div>
                    </div>
                    <div th:if="${#lists.isEmpty(news.images)}"
                        style="height: 60px; background: var(--surface-sunken); display: flex; align-items: center; justify-content: center;">
                        <i data-lucide="newspaper" style="color: var(--text-light); opacity: 0.3;"></i>
                        <div th:if="${news.highlighted}"
                            style="position: absolute; top: 10px; right: 10px; background: var(--accent); color: white; border-radius: 50%; padding: 0.5rem; box-shadow: var(--shadow-md);"
                            title="Destaque">
                            <i data-lucide="star" style="width: 16px; height: 16px; fill: white;"></i>
                        </div>
                    </div>

                    <div style="padding: 1.5rem; display: flex; flex-direction: column; flex: 1;">
                        <span
                            style="font-size: 0.75rem; color: var(--text-muted); font-weight: 600; display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.5rem;">
                            <i data-lucide="calendar" style="width: 12px;"></i>
                            <span th:text="${#temporals.format(news.publishDate, 'dd MMM yyyy')}">Data</span>
                        </span>

                        <h3
                            style="font-size: 1.125rem; font-weight: 700; color: var(--primary); margin-bottom: 0.75rem; line-height: 1.4;">
                            <a th:href="@{'/news/' + ${news.id}}" style="color: inherit; text-decoration: none;"
                                th:text="${news.title}">Título</a>
                        </h3>

                        <p style="font-size: 0.875rem; color: var(--text-secondary); line-height: 1.6; margin-bottom: 1.5rem; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;"
                            th:text="${news.content}">
                            Resumo...
                        </p>

                        <div style="margin-top: auto;">
                            <a th:href="@{'/news/' + ${news.id}}" class="btn btn-ghost"
                                style="padding: 0; color: var(--accent); font-weight: 600;">
                                Ler Completo <i data-lucide="arrow-right" style="width: 16px; margin-left: 4px;"></i>
                            </a>
                        </div>
                    </div>
                </article>
            </div>

            <div th:if="${newsList.empty}" style="text-align: center; padding: 4rem 1rem;">
                <div style="color: var(--text-light); margin-bottom: 1rem;">
                    <i data-lucide="search-x" style="width: 48px; height: 48px; opacity: 0.2;"></i>
                </div>
                <h3 style="font-size: 1.125rem; font-weight: 700; color: var(--text-muted);">Nenhuma notícia encontrada
                </h3>
                <p style="color: var(--text-light); font-size: 0.875rem;">Tente ajustar os filtros de busca.</p>
            </div>
        </div>
    </div>
</body>

</html>
