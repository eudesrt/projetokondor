# Database Configuration (PostgreSQL)
# Troque 'localhost' pelo IP do seu servidor de banco de dados se necess�rio
spring.datasource.url=jdbc:postgresql://172.20.1.130:5432/flash
spring.datasource.username=flash
spring.datasource.password=flash00
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQL94Dialect
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# File Upload Configuration
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=100MB

# Thymeleaf
spring.thymeleaf.cache=false

# Static content
spring.resources.static-locations=classpath:/static/,file:uploads/

# Date/Time formatting for forms
spring.mvc.format.date-time=iso

