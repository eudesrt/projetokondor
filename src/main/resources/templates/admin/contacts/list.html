<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout}">

<head>
    <title>Gerenciar Contatos</title>
</head>

<body>
    <div layout:fragment="page-header">
        <div style="display: flex; flex-direction: column;">
            <span
                style="font-size: 0.75rem; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em;">Cadastro
                Contato Uteis</span>
            <h2 style="font-size: 1.5rem; font-weight: 800; color: var(--primary); margin: 0;">Contatos Úteis</h2>
        </div>
    </div>

    <div layout:fragment="page-actions">
        <a th:href="@{/admin/contacts/new}" class="btn btn-primary"
            style="padding: 0.625rem 1.25rem; gap: 0.5rem; box-shadow: var(--shadow-soft);">
            <i data-lucide="plus" style="width: 18px;"></i> Novo Contato
        </a>
    </div>

    <div layout:fragment="content" class="animate-fade-in">
        <div class="card" style="padding: 0; overflow: hidden; border: none; box-shadow: var(--shadow-soft);">
            <div class="table-responsive">
                <table class="table" style="margin-bottom: 0;">
                    <thead style="background: var(--surface-sunken);">
                        <tr>
                            <th
                                style="padding: 1.25rem; font-weight: 700; font-size: 0.75rem; text-transform: uppercase; color: var(--text-light);">
                                Ordem</th>
                            <th
                                style="padding: 1.25rem; font-weight: 700; font-size: 0.75rem; text-transform: uppercase; color: var(--text-light);">
                                Nome / Local</th>
                            <th
                                style="padding: 1.25rem; font-weight: 700; font-size: 0.75rem; text-transform: uppercase; color: var(--text-light);">
                                Telefone / Ramal</th>
                            <th
                                style="padding: 1.25rem; font-weight: 700; font-size: 0.75rem; text-transform: uppercase; color: var(--text-light);">
                                Cargo</th>
                            <th
                                style="padding: 1.25rem; font-weight: 700; font-size: 0.75rem; text-transform: uppercase; color: var(--text-light);">
                                Emergência</th>
                            <th
                                style="padding: 1.25rem; font-weight: 700; font-size: 0.75rem; text-transform: uppercase; color: var(--text-light);">
                                Status</th>
                            <th
                                style="padding: 1.25rem; font-weight: 700; font-size: 0.75rem; text-transform: uppercase; color: var(--text-light); text-align: right;">
                                Ações</th>
                        </tr>
                    </thead>
                    <tbody style="background: white;">
                        <tr th:each="contact : ${contacts}"
                            style="border-bottom: 1px solid var(--border-light); transition: background 0.2s;"
                            onmouseover="this.style.background='var(--surface-sunken)'"
                            onmouseout="this.style.background='white'">
                            <td style="padding: 1.25rem; font-weight: 700; color: var(--text-muted);"
                                th:text="${contact.displayOrder}">1</td>
                            <td style="padding: 1.25rem;">
                                <div style="font-weight: 700; color: var(--primary);" th:text="${contact.name}">Portaria
                                </div>
                            </td>
                            <td style="padding: 1.25rem;">
                                <span style="font-family: monospace; font-weight: 600; color: var(--primary);"
                                    th:text="${contact.phoneNumber}">10</span>
                            </td>
                            <td style="padding: 1.25rem; font-size: 0.875rem; color: var(--text-muted);"
                                th:text="${contact.role}">-</td>
                            <td style="padding: 1.25rem;">
                                <span th:if="${contact.emergency}"
                                    style="background: #fef2f2; color: #ef4444; font-size: 0.7rem; font-weight: 800; padding: 0.25rem 0.75rem; border-radius: 20px; border: 1px solid #fee2e2;">
                                    EMERGÊNCIA
                                </span>
                            </td>
                            <td style="padding: 1.25rem;">
                                <form th:action="@{/admin/contacts/{id}/toggle(id=${contact.id})}" method="post">
                                    <button type="submit"
                                        th:class="${contact.active ? 'badge bg-success' : 'badge bg-secondary'}"
                                        style="border: none; cursor: pointer; padding: 0.4rem 0.8rem; font-weight: 600; border-radius: var(--radius-sm);"
                                        th:text="${contact.active ? 'Ativo' : 'Inativo'}">Ativo</button>
                                </form>
                            </td>
                            <td style="padding: 1.25rem; text-align: right;">
                                <div style="display: flex; gap: 0.5rem; justify-content: flex-end;">
                                    <a th:href="@{/admin/contacts/{id}/edit(id=${contact.id})}" class="btn btn-icon"
                                        style="color: var(--primary); background: var(--surface-sunken);"
                                        title="Editar">
                                        <i data-lucide="edit-3" style="width: 16px;"></i>
                                    </a>
                                    <form th:action="@{/admin/contacts/{id}/delete(id=${contact.id})}" method="post"
                                        onsubmit="return confirm('Tem certeza que deseja remover este contato?');">
                                        <button type="submit" class="btn btn-icon"
                                            style="color: var(--error); background: #fef2f2;" title="Excluir">
                                            <i data-lucide="trash-2" style="width: 16px;"></i>
                                        </button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${contacts.empty}">
                            <td colspan="7" class="text-center py-5">
                                <i data-lucide="phone-off"
                                    style="width: 48px; height: 48px; color: var(--text-light); margin-bottom: 1rem;"></i>
                                <p style="color: var(--text-muted); font-weight: 600;">Nenhum contato estratégico
                                    cadastrado.</p>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>

</html>
