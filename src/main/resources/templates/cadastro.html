<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Cadastro')}"></head>
<body>

<div class="container page fade-in">

    <header style="padding: 58px 20px 14px;">
        <div class="section-head__eyebrow">Nova conta</div>
        <div style="font-family: var(--font-serif); font-size: 34px; line-height: 1; color: var(--ink); letter-spacing: -1px; margin-top: 2px;">Cadastre-se</div>
        <div style="font-size:14px; color: var(--ink-3); margin-top:10px; line-height:1.5;">
            Preencha os dados abaixo para acessar o app do condomínio. Sua unidade precisará ser confirmada pela administração.
        </div>
    </header>

    <!-- Flash message -->
    <div th:if="${message}" class="card" style="margin: 0 20px 16px; padding:12px 14px; background: var(--brand-50); border-color: var(--brand);">
        <div style="font-size:13px; color: var(--brand); font-weight:600;" th:text="${message}">Mensagem</div>
    </div>

    <form th:action="@{/cadastro}" method="post" th:object="${registerForm}" style="padding: 0 20px 40px;">

        <div style="font-size:12px; color: var(--ink-3); font-weight:700; text-transform:uppercase; letter-spacing:.6px; margin-bottom:10px;">
            Dados pessoais
        </div>

        <label class="field">
            <span class="field__label">Nome completo</span>
            <input class="input" type="text" th:field="*{fullName}" placeholder="Ex. Marina Oliveira" required>
            <div th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"
                 style="color: var(--danger); font-size:12px; margin-top:4px;"></div>
        </label>

        <label class="field">
            <span class="field__label">Celular</span>
            <input class="input" type="tel" th:field="*{phone}" placeholder="(11) 9xxxx-xxxx">
        </label>

        <label class="field">
            <span class="field__label">Unidade</span>
            <input class="input" type="text" th:field="*{unit}" placeholder="Ex. 1208">
        </label>

        <div style="font-size:12px; color: var(--ink-3); font-weight:700; text-transform:uppercase; letter-spacing:.6px; margin: 22px 0 10px;">
            Acesso
        </div>

        <label class="field">
            <span class="field__label">E-mail</span>
            <input class="input" type="email" th:field="*{email}" placeholder="voce@email.com" required>
            <div th:if="${#fields.hasErrors('email')}" th:errors="*{email}"
                 style="color: var(--danger); font-size:12px; margin-top:4px;"></div>
        </label>

        <label class="field">
            <span class="field__label">Senha</span>
            <input class="input" type="password" th:field="*{password}" placeholder="Mínimo 8 caracteres" minlength="8" required>
        </label>

        <button type="submit" class="btn btn--primary btn--block">Criar conta</button>

        <div style="text-align:center; margin-top:18px; font-size:13px; color: var(--ink-3);">
            Já tem uma conta?
            <a th:href="@{/login}" style="color: var(--brand); font-weight:700;">Entrar</a>
        </div>
    </form>
</div>
</body>
</html>
