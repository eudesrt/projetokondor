<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Entrar')}"></head>
<body>

<div class="container page fade-in">

    <header style="padding: 80px 20px 20px; text-align:center;">
        <svg th:replace="~{fragments/layout :: logo(64)}" style="margin: 0 auto;"></svg>
        <div style="font-family: var(--font-serif); font-size:34px; color: var(--ink); letter-spacing:-1px; margin-top:18px;">
            Viva Benx Mascote
        </div>
        <div style="font-size:14px; color: var(--ink-3); margin-top:6px;">Acesse sua conta</div>
    </header>

    <div th:if="${param.error}" class="card" style="margin: 0 20px 16px; padding:12px 14px; background: var(--danger-bg); border-color:#f8c8c8;">
        <div style="font-size:13px; color: var(--danger-ink); font-weight:600;">Usuário ou senha incorretos.</div>
    </div>
    <div th:if="${param.pending}" class="card" style="margin: 0 20px 16px; padding:12px 14px; background: #fff8e1; border-color:#ffe082;">
        <div style="font-size:13px; color: #b8860b; font-weight:600;">Cadastro aguardando aprovação do administrador.</div>
    </div>
    <div th:if="${param.rejected}" class="card" style="margin: 0 20px 16px; padding:12px 14px; background: var(--danger-bg); border-color:#f8c8c8;">
        <div style="font-size:13px; color: var(--danger-ink); font-weight:600;">Cadastro não aprovado. Entre em contato com a administração.</div>
    </div>

    <form th:action="@{/login}" method="post" style="padding: 10px 20px 40px;">

        <label class="field">
            <span class="field__label">Usuário</span>
            <input class="input" type="text" name="username" required autofocus>
        </label>

        <label class="field">
            <span class="field__label">Senha</span>
            <input class="input" type="password" name="password" required>
        </label>

        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 18px;">
            <label style="display:flex; align-items:center; gap:8px; font-size:13px; color: var(--ink-2);">
                <input type="checkbox" name="remember">
                Manter conectado
            </label>
            <a th:href="@{/recuperar-senha}" style="font-size:13px; color: var(--brand); font-weight:600;">Esqueci a senha</a>
        </div>

        <button type="submit" class="btn btn--primary btn--block">Entrar</button>

        <div style="text-align:center; margin-top:22px; font-size:13px; color: var(--ink-3);">
            Primeiro acesso?
            <a th:href="@{/cadastro}" style="color: var(--brand); font-weight:700;">Cadastre-se</a>
        </div>
    </form>
</div>
</body>
</html>
