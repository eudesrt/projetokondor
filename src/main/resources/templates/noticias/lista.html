<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Notícias')}"></head>
<body>

<div class="container page fade-in">

    <!-- Masthead -->
    <header style="padding: 58px 20px 12px;">
        <div class="u-flex" style="align-items:center; gap:10px; margin-bottom:12px;">
            <div style="flex:1;">
                <div class="section-head__eyebrow">O diário do condomínio</div>
                <div style="font-family: var(--font-serif); font-size: 34px; line-height: 1; color: var(--ink); letter-spacing: -1px; margin-top: 2px;">Notícias</div>
            </div>
            <button class="bell" type="button" aria-label="Buscar">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="M20 20l-3.5-3.5"/></svg>
            </button>
        </div>

        <!-- category pills -->
        <div class="scroll-x" style="display:flex; gap:8px; margin: 0 -20px; padding: 0 20px 4px;">
            <a th:each="c : ${categories}" th:href="@{/noticias(cat=${c.id})}" class="chip"
               th:classappend="${c.id == activeCat} ? 'is-active'"
               th:text="${c.label}">Categoria</a>
        </div>
    </header>

    <!-- Hero story -->
    <div class="news-hero" th:if="${hero != null}">
        <a th:href="@{/noticias/{id}(id=${hero.id})}" class="card card--interactive news-hero__card">
            <div class="news-hero__imgwrap">
                <img class="news-hero__img" th:src="@{/{src}(src=${hero.img})}" th:alt="${hero.title}">
                <div class="news-hero__gradient"></div>
                <div class="news-hero__badge">
                    <span th:replace="~{fragments/layout :: badge(${hero.cat}, ${hero.tag})}"></span>
                </div>
                <div class="news-hero__overlay">
                    <div class="news-hero__eyebrow">Em destaque</div>
                    <div class="news-hero__title" th:text="${hero.title}">Título</div>
                </div>
            </div>
            <div class="news-hero__body">
                <div class="news-hero__excerpt" th:text="${hero.excerpt}">Resumo...</div>
                <div class="news-hero__meta">
                    <span th:text="${hero.date}">Data</span><span>•</span>
                    <span th:text="${hero.read}">3 min</span>
                    <th:block th:if="${hero.author != null}">
                        <span>•</span><span th:text="${hero.author}">Autor</span>
                    </th:block>
                </div>
            </div>
        </a>
    </div>

    <!-- Section -->
    <div class="section-head" th:if="${not #lists.isEmpty(others)}">
        <div class="section-head__title" style="font-size:20px;">Mais lidas</div>
        <div class="section-head__eyebrow" th:text="|${#lists.size(others)} notícias|">0 notícias</div>
    </div>

    <!-- Stacked list -->
    <div class="news-list">
        <a th:each="n : ${others}" th:href="@{/noticias/{id}(id=${n.id})}" class="card card--interactive">
            <div style="display:flex; gap:12px; padding:12px;">
                <img th:src="@{/{src}(src=${n.img})}" th:alt="${n.title}"
                     style="width:88px; height:88px; border-radius:12px; object-fit:cover; flex-shrink:0; background:#eef2f6;">
                <div style="flex:1; min-width:0;">
                    <span th:replace="~{fragments/layout :: badge(${n.cat}, ${n.tag})}"></span>
                    <div class="news-row__title" th:text="${n.title}">Título</div>
                    <div class="news-row__meta"><span th:text="${n.date}">Data</span> • <span th:text="${n.read}">Leitura</span></div>
                </div>
            </div>
        </a>
    </div>

    <!-- Empty state -->
    <div th:if="${hero == null and #lists.isEmpty(others)}" class="card" style="margin:16px; padding:40px; text-align:center;">
        <div style="font-size:40px; margin-bottom:10px;">🔍</div>
        <div style="font-size:14px; font-weight:700; color: var(--ink);">Nada encontrado</div>
        <div style="font-size:12px; color: var(--ink-3); margin-top:4px;">Tente outra categoria</div>
    </div>

    <div th:replace="~{fragments/layout :: tabbar('news')}"></div>
</div>
</body>
</html>
