<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout}">

<head>
    <title>Gestão de Moradores</title>
</head>

<body>
    <div layout:fragment="page-header">
        <div style="display: flex; flex-direction: column;">
            <span
                style="font-size: 0.75rem; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em;">Gestão
                Administrativa</span>
            <h2 style="font-size: 1.5rem; font-weight: 800; color: var(--primary); margin: 0;">Moradores</h2>
        </div>
    </div>

    <div layout:fragment="page-actions">
        <div
            style="display: flex; gap: 0.5rem; background: var(--surface-sunken); padding: 0.35rem; border-radius: var(--radius-full); border: 1px solid var(--border-light);">
            <a th:href="@{/admin/residents}" class="btn"
                th:style="${currentStatus == null} ? 'background: white; color: var(--primary); box-shadow: var(--shadow-soft); font-size: 0.8125rem; height: 32px; display: flex; align-items: center;' : 'background: transparent; color: var(--text-muted); border: none; font-size: 0.8125rem; height: 32px; display: flex; align-items: center;'">
                Todos
            </a>
            <a th:href="@{/admin/residents(status='PENDING')}" class="btn"
                th:style="${currentStatus != null && currentStatus.name() == 'PENDING'} ? 'background: white; color: var(--primary); box-shadow: var(--shadow-soft); font-size: 0.8125rem; height: 32px; display: flex; align-items: center;' : 'background: transparent; color: var(--text-muted); border: none; font-size: 0.8125rem; height: 32px; display: flex; align-items: center;'">
                Pendentes
            </a>
            <a th:href="@{/admin/residents(status='APPROVED')}" class="btn"
                th:style="${currentStatus != null && currentStatus.name() == 'APPROVED'} ? 'background: white; color: var(--primary); box-shadow: var(--shadow-soft); font-size: 0.8125rem; height: 32px; display: flex; align-items: center;' : 'background: transparent; color: var(--text-muted); border: none; font-size: 0.8125rem; height: 32px; display: flex; align-items: center;'">
                Aprovados
            </a>
        </div>
    </div>

    <div layout:fragment="content" class="animate-fade-in">
        <div class="premium-table-container">
            <div
                style="padding: 1.5rem; border-bottom: 1px solid var(--border-light); display: flex; justify-content: space-between; align-items: center;">
                <h3 style="font-size: 1.125rem; font-weight: 700; color: var(--primary);">Lista de Moradores</h3>
                <form th:action="@{/admin/residents}" method="get"
                    style="display: flex; gap: 0.5rem; align-items: center;">
                    <input type="hidden" name="status" th:value="${currentStatus}" th:if="${currentStatus != null}">
                    <div style="position: relative;">
                        <input type="text" name="keyword" th:value="${keyword}"
                            placeholder="Buscar por nome ou unidade..."
                            style="padding: 0.625rem 1.25rem 0.625rem 2.75rem; border-radius: var(--radius-full); border: 1px solid var(--border); font-size: 0.875rem; width: 260px; background: var(--surface-sunken);">
                        <i data-lucide="search"
                            style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); width: 16px; color: var(--text-muted);"></i>
                    </div>
                </form>
            </div>
            <table class="premium-table">
                <thead>
                    <tr>
                        <th>Morador</th>
                        <th>Unidade</th>
                        <th>Perfil</th>
                        <th
                            style="padding: 1.25rem 1.5rem; text-align: left; font-size: 0.75rem; font-weight: 800; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em;">
                            Status</th>
                        <th
                            style="padding: 1.25rem 1.5rem; text-align: right; font-size: 0.75rem; font-weight: 800; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em;">
                            Ações</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="user : ${users}"
                        style="border-bottom: 1px solid var(--border-light); transition: background 0.1s;">
                        <td style="padding: 1.25rem 1.5rem;">
                            <div style="display: flex; align-items: center; gap: 0.75rem;">
                                <div
                                    style="width: 40px; height: 40px; background: var(--surface-sunken); border: 1px solid var(--border-light); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; color: var(--primary); font-size: 0.875rem;">
                                    <span th:text="${#strings.substring(user.fullName, 0, 1)}">M</span>
                                </div>
                                <div>
                                    <div style="font-weight: 700; color: var(--primary); font-size: 0.9375rem;"
                                        th:text="${user.fullName}">Nome</div>
                                    <div style="font-size: 0.75rem; color: var(--text-muted);" th:text="${user.email}">
                                        email@email.com</div>
                                </div>
                            </div>
                        </td>
                        <td style="font-weight: 600; color: var(--primary-light);" th:text="${user.unit}">Apto 101</td>
                        <td>
                            <span th:each="role : ${user.roles}" class="badge"
                                style="background: var(--surface-sunken); color: var(--primary); font-size: 0.65rem;"
                                th:text="${role.name.replace('ROLE_', '')}">ROLE</span>
                        </td>
                        <td>
                            <div style="display: flex; align-items: center;">
                                <span class="ticket-status-dot"
                                    th:classappend="${user.status.name() == 'PENDING' ? 'status-em_andamento' : 'status-concluido'}"></span>
                                <span
                                    style="font-weight: 700; font-size: 0.75rem; color: var(--primary); text-transform: uppercase;"
                                    th:text="${user.status.name() == 'PENDING' ? 'Pendente' : 'Aprovado'}">STATUS</span>
                            </div>
                        </td>
                        <td style="text-align: right;">
                            <div style="display: flex; gap: 0.5rem; justify-content: flex-end;">
                                <!-- Actions for Pending -->
                                <th:block th:if="${user.status.name() == 'PENDING'}">
                                    <form th:action="@{/admin/residents/approve/{id}(id=${user.id})}" method="post">
                                        <button type="submit" class="btn"
                                            style="padding: 0.4rem; background: #dcfce7; color: #166534; border: none; border-radius: var(--radius-sm);"
                                            title="Aprovar">
                                            <i data-lucide="check" style="width: 18px;"></i>
                                        </button>
                                    </form>
                                    <form th:action="@{/admin/residents/reject/{id}(id=${user.id})}" method="post">
                                        <button type="submit" class="btn"
                                            style="padding: 0.4rem; background: #fee2e2; color: #991b1b; border: none; border-radius: var(--radius-sm);"
                                            title="Recusar"
                                            onclick="return confirm('Tem certeza que deseja recusar este usuário?');">
                                            <i data-lucide="x" style="width: 18px;"></i>
                                        </button>
                                    </form>
                                </th:block>

                                <!-- Actions for Approved -->
                                <th:block th:unless="${user.status.name() == 'PENDING'}">
                                    <a th:href="@{/admin/residents/edit/{id}(id=${user.id})}" class="btn"
                                        style="padding: 0.4rem; background: var(--surface-sunken); color: var(--primary); border: none; border-radius: var(--radius-sm);"
                                        title="Editar">
                                        <i data-lucide="edit-3" style="width: 18px;"></i>
                                    </a>
                                    <form th:action="@{/admin/residents/toggle-active/{id}(id=${user.id})}"
                                        method="post">
                                        <button type="submit" class="btn"
                                            th:styleappend="${user.active ? 'background: #fee2e2; color: #991b1b;' : 'background: #dcfce7; color: #166534;'}"
                                            style="padding: 0.4rem; border: none; border-radius: var(--radius-sm);"
                                            th:title="${user.active ? 'Inativar' : 'Ativar'}">
                                            <i th:attr="data-lucide=${user.active ? 'lock' : 'unlock'}"
                                                style="width: 18px;"></i>
                                        </button>
                                    </form>
                                </th:block>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
    </div>
</body>

</html>
