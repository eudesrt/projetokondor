<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Aprovação Pendente')}"></head>
<body>

<div class="container page fade-in" style="display: flex; align-items: center; justify-content: center; padding: 40px 20px;">
    <div style="text-align: center; max-width: 450px;">
        <div style="width: 80px; height: 80px; background: var(--warn-bg); border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; color: var(--warn); margin-bottom: 24px;">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
            </svg>
        </div>

        <h1 style="font-size: 24px; font-weight: 800; color: var(--ink); margin-bottom: 12px;">Cadastro em Análise</h1>

        <p style="color: var(--ink-2); line-height: 1.6; margin-bottom: 32px; font-size: 15px;">
            Olá, <strong th:text="${user.fullName}">Usuário</strong>!<br>
            Seu cadastro foi recebido e está aguardando aprovação da administração do condomínio.
        </p>

        <div style="background: var(--bg); border: 1px solid var(--line); padding: 16px; border-radius: var(--r-md); margin-bottom: 32px; font-size: 14px; text-align: left;">
            <p style="margin-bottom: 8px; font-weight: 700; color: var(--ink);">Próximos passos:</p>
            <ul style="margin: 0; padding-left: 20px; color: var(--ink-2); line-height: 1.8;">
                <li style="margin-bottom: 4px;">Aguarde a validação dos seus dados.</li>
                <li>Você receberá um e-mail assim que o acesso for liberado.</li>
            </ul>
        </div>

        <form th:action="@{/logout}" method="post">
            <button type="submit" class="btn btn--primary btn--block">Voltar para o Login</button>
        </form>
    </div>
</div>

</body>
</html>
