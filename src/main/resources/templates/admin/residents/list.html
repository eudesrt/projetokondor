<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Moradores')}"></head>
<body>

<div class="admin">
    <aside class="admin__sidebar">
        <div class="admin__brand">
            <svg th:replace="~{fragments/layout :: logo(32)}"></svg>
            <div>
                <div class="admin__brand-name">Viva Benx Mascote</div>
                <div class="admin__brand-role">Painel do síndico</div>
            </div>
        </div>

        <a th:href="@{/admin}" class="admin__nav-item">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5L12 3l9 7.5V20a1 1 0 01-1 1h-5v-6h-6v6H4a1 1 0 01-1-1V10.5z"/></svg>
            <span style="flex:1;">Dashboard</span>
        </a>
        <a th:href="@{/admin/chamados}" class="admin__nav-item">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a4 4 0 015.3 5.3l-9 9a2 2 0 11-2.8-2.8l9-9z"/><path d="M14 6l4 4"/></svg>
            <span style="flex:1;">Chamados</span>
        </a>
        <a th:href="@{/admin/noticias}" class="admin__nav-item">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M7 8h10M7 12h10M7 16h6"/></svg>
            <span style="flex:1;">Publicações</span>
        </a>
        <a th:href="@{/admin/moradores}" class="admin__nav-item is-active">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0116 0"/></svg>
            <span style="flex:1;">Moradores</span>
        </a>
        <a th:href="@{/admin/contatos}" class="admin__nav-item">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72 12.84 12.84 0 00.7 2.81 2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45 12.84 12.84 0 002.81.7A2 2 0 0122 16.92z"/></svg>
            <span style="flex:1;">Contatos</span>
        </a>
    </aside>

    <main class="admin__main">
        <div class="admin__topbar">
            <div style="flex:1;">
                <div class="admin__topbar-eyebrow">Gerenciamento</div>
                <div class="admin__topbar-title">Moradores</div>
            </div>
            <div class="admin__search">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="M20 20l-3.5-3.5"/></svg>
                <span>Buscar morador...</span>
            </div>
        </div>

        <div class="admin__content">
            <div class="card">
                <table class="table">
                    <thead>
                        <tr>
                            <th>Morador</th>
                            <th>Unidade</th>
                            <th>Email</th>
                            <th>Status</th>
                            <th style="text-align: right;">Ações</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="user : ${userList}">
                            <td>
                                <div style="font-weight: 700;" th:text="${user.fullName}">Nome</div>
                            </td>
                            <td th:text="${user.unit}">Unidade</td>
                            <td th:text="${user.email}">Email</td>
                            <td>
                                <span th:if="${user.active}" class="badge">ATIVO</span>
                                <span th:unless="${user.active}" class="badge badge--red">INATIVO</span>
                            </td>
                            <td style="text-align: right;">
                                <a th:href="@{/admin/moradores/{id}(id=${user.id})}" class="btn btn--sm" style="background: var(--brand-50); color: var(--brand);">Editar</a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</div>

</body>
</html>
