<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title layout:title-pattern="$LAYOUT_TITLE | $CONTENT_TITLE">Kondor System</title>
    <link rel="stylesheet" th:href="@{/css/index.css?v=12}">
    <link rel="stylesheet" th:href="@{/css/news-detail.css?v=12}">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@700&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
    <div class="layout-container">
        <!-- Modern Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-logo">
                <i data-lucide="building" style="width: 28px; height: 28px;"></i>
                <span>Kondor</span>
            </div>

            <nav style="flex: 1; overflow-y: auto;">
                <a th:href="@{/}" class="nav-link"
                    th:classappend="${#httpServletRequest.requestURI == '/' ? 'active' : ''}">
                    <i data-lucide="layout-dashboard" style="width: 20px; height: 20px;"></i>
                    <span>Início</span>
                </a>

                <div sec:authorize="hasAnyRole('SINDICA', 'ZELADOR', 'ADMIN')">
                    <p
                        style="text-transform: uppercase; font-size: 0.65rem; font-weight: 700; color: var(--text-light); margin: 2rem 0 0.75rem; padding-left: 1rem; letter-spacing: 0.05em;">
                        Cadastro</p>
                    <a th:href="@{/admin/residents}" class="nav-link"
                        th:classappend="${#httpServletRequest.requestURI.startsWith('/admin/residents') ? 'active' : ''}">
                        <i data-lucide="users" style="width: 20px; height: 20px;"></i>
                        <span>Moradores</span>
                    </a>
                    <a th:href="@{/admin/news}" class="nav-link"
                        th:classappend="${#httpServletRequest.requestURI.startsWith('/admin/news') ? 'active' : ''}">
                        <i data-lucide="newspaper" style="width: 20px; height: 20px;"></i>
                        <span>Notícias</span>
                    </a>
                    <a th:href="@{/admin/tickets}" class="nav-link"
                        th:classappend="${#httpServletRequest.requestURI.startsWith('/admin/tickets') ? 'active' : ''}">
                        <i data-lucide="message-square" style="width: 20px; height: 20px;"></i>
                        <span>Chamados</span>
                    </a>
                    <a th:href="@{/admin/contacts}" class="nav-link"
                        th:classappend="${#httpServletRequest.requestURI.startsWith('/admin/contacts') ? 'active' : ''}">
                        <i data-lucide="phone" style="width: 20px; height: 20px;"></i>
                        <span>Suporte</span>
                    </a>
                </div>

                <div>
                    <p
                        style="text-transform: uppercase; font-size: 0.65rem; font-weight: 700; color: var(--text-light); margin: 2rem 0 0.75rem; padding-left: 1rem; letter-spacing: 0.05em;">
                        Geral</p>
                    <a th:href="@{/news}" class="nav-link"
                        th:classappend="${#httpServletRequest.requestURI.startsWith('/news') ? 'active' : ''}">
                        <i data-lucide="newspaper" style="width: 20px; height: 20px;"></i>
                        <span>Notícias</span>
                    </a>
                </div>

                <div sec:authorize="hasAnyRole('CONDOMINO', 'PROPRIETARIO', 'SINDICA', 'ZELADOR', 'ADMIN')">
                    <p
                        style="text-transform: uppercase; font-size: 0.65rem; font-weight: 700; color: var(--text-light); margin: 2rem 0 0.75rem; padding-left: 1rem; letter-spacing: 0.05em;">
                        Morador</p>
                    <a th:href="@{/resident/tickets}" class="nav-link"
                        th:classappend="${#httpServletRequest.requestURI.startsWith('/resident/tickets') ? 'active' : ''}">
                        <i data-lucide="message-circle" style="width: 20px; height: 20px;"></i>
                        <span>Meus Chamados</span>
                    </a>
                </div>


            </nav>

            <div style="margin-top: auto; padding-top: 1.5rem; border-top: 1px solid var(--border-light);">
                <a th:href="@{/logout}" class="nav-link" style="color: var(--error);">
                    <i data-lucide="log-out" style="width: 20px; height: 20px;"></i>
                    <span>Sair</span>
                </a>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <!-- Glass Header -->
            <header class="app-header">
                <div style="flex: 1; display: flex; align-items: center; min-width: 0;">
                    <div layout:fragment="page-header" style="width: 100%; display: flex; align-items: center;">
                        <h1
                            style="font-size: 1.5rem; font-weight: 800; letter-spacing: -0.025em; color: var(--text-main); margin: 0;">
                            Dashboard</h1>
                    </div>
                </div>

                <div style="display: flex; align-items: center; gap: 1.5rem;">
                    <div layout:fragment="page-actions" style="display: flex; align-items: center; gap: 0.75rem;">
                        <!-- Page Contextual Actions -->
                    </div>

                    <div style="text-align: right; line-height: 1.2;">
                        <span th:text="${#authentication.name}"
                            style="display: block; font-weight: 600; font-size: 0.875rem;">Usuário</span>
                        <span style="font-size: 0.75rem; color: var(--text-muted);"
                            th:text="${#authentication.authorities[0]}">Role</span>
                    </div>
                    <div
                        style="width: 40px; height: 40px; border-radius: 50%; background: var(--surface-sunken); display: flex; align-items: center; justify-content: center; color: var(--text-muted); border: 1px solid var(--border);">
                        <i data-lucide="user" style="width: 20px; height: 20px;"></i>
                    </div>
                </div>
            </header>

            <!-- Inner Content -->
            <div class="content-wrapper">
                <div layout:fragment="content">
                    <!-- Page Content -->
                </div>
            </div>
        </main>
    </div>

    <script th:src="@{/js/hero-color-extractor.js}"></script>
    <script>
        lucide.createIcons();
    </script>
</body>

</html>
